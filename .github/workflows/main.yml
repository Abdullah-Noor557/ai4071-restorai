name: Quality Gate

# =============================================================================
# RestorAI - Automated Quality Gate (OEL).
#
# Runs on every push to ``main`` and on pull requests targeting ``main``.
# The job:
#   1. Checks out the source.
#   2. Installs Python + project dependencies.
#   3. Runs ``run_eval.py`` against eval_thresholds.json.
#   4. Uploads ``eval_results.json`` as a build artefact.
#   5. Fails the build (red X on the commit, blocked merge) if any metric
#      is below threshold.
#
# Secrets are read from the repository's GitHub Secrets store
# (Settings -> Secrets and variables -> Actions). NO credentials live in
# this file or anywhere else in the repository.
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    name: Run agent evaluation suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # ---- Secrets - injected from GitHub Actions secret store ------------
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      # ---- Reproducibility ------------------------------------------------
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

      # ---- Tell the agent + KB where to live in CI ------------------------
      CHROMA_DB_PATH: ${{ github.workspace }}/chroma_db
      CHECKPOINT_DB_PATH: ${{ github.workspace }}/data/checkpoints.sqlite

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify required secrets are present
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::OPENAI_API_KEY secret is not set in the repository."
            exit 2
          fi

      - name: Build / refresh the knowledge base
        run: |
          mkdir -p "${CHROMA_DB_PATH}"
          python ingest_data.py

      - name: Run evaluation gate
        id: eval
        run: |
          python run_eval.py \
            --thresholds eval_thresholds.json \
            --output     eval_results.json

      - name: Render gate summary
        if: always()
        run: |
          if [ -f eval_results.json ]; then
            echo "## Quality-gate results" >> "$GITHUB_STEP_SUMMARY"
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib
          d = json.loads(pathlib.Path("eval_results.json").read_text())
          ok = "PASS" if d["overall_passed"] else "FAIL"
          print(f"\n**Overall: {ok}**\n")
          print("| metric | score | threshold | passed |")
          print("|---|---|---|---|")
          for m in d["metrics"]:
              passed = "yes" if m["passed"] else "no"
              print(f"| {m['name']} | {m['score']:.3f} | {m['threshold']:.3f} | {passed} |")
          PY
          fi

      - name: Upload eval artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval_results
          path: eval_results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Fail build if thresholds not met
        if: steps.eval.outcome == 'failure'
        run: |
          echo "::error::Quality gate failed - see eval_results.json"
          exit 1
